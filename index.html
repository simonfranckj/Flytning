<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flytning 🏡</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f7f5f2;
    color: #1a1a1a;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: #1a1a1a;
    color: white;
    padding: 1.5rem 1.5rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
  header p { font-size: 0.78rem; color: #888; margin-top: 0.2rem; }

  .countdown {
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 0.6rem 1rem;
    text-align: center;
    flex-shrink: 0;
  }
  .countdown-num { font-size: 1.6rem; font-weight: 700; color: #f0a070; line-height: 1; }
  .countdown-lbl { font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 0.15rem; }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    height: calc(100vh - 88px);
  }

  @media (max-width: 640px) {
    .layout { grid-template-columns: 1fr; height: auto; }
    .links-side { border-left: none; border-top: 1px solid #e8e4de; }
  }

  /* SHARED PANEL */
  .panel { display: flex; flex-direction: column; height: 100%; overflow: hidden; }

  .panel-header {
    padding: 1rem 1.25rem 0.75rem;
    border-bottom: 1px solid #e8e4de;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #faf8f5;
    flex-shrink: 0;
  }

  .panel-title {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
  }

  .panel-meta { font-size: 0.78rem; color: #aaa; }

  .panel-body { flex: 1; overflow-y: auto; padding: 1rem 1.25rem; }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: #ddd; border-radius: 99px; }

  .panel-footer {
    border-top: 1px solid #e8e4de;
    padding: 0.75rem 1.25rem;
    background: #faf8f5;
    flex-shrink: 0;
  }

  /* TASKS */
  .tasks-side { border-right: 1px solid #e8e4de; }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.6rem 0;
    border-bottom: 1px solid #f0ede8;
    group: true;
  }

  .task-item:last-child { border-bottom: none; }

  .task-cb {
    width: 18px; height: 18px;
    border-radius: 5px;
    border: 2px solid #ccc;
    background: white;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .task-cb.checked { background: #4a7c59; border-color: #4a7c59; }
  .task-cb.checked::after { content: '✓'; color: white; font-size: 0.65rem; font-weight: 700; }

  .task-text { flex: 1; font-size: 0.9rem; line-height: 1.4; color: #333; padding-top: 1px; cursor: pointer; }
  .task-text.done { text-decoration: line-through; color: #bbb; }

  .task-del {
    background: none; border: none; cursor: pointer;
    color: #ddd; font-size: 0.9rem; padding: 2px 4px;
    transition: color 0.15s; flex-shrink: 0;
    opacity: 0;
  }

  .task-item:hover .task-del { opacity: 1; }
  .task-del:hover { color: #e05a3a; }

  /* Add task input */
  .add-row {
    display: flex;
    gap: 0.5rem;
  }

  .add-row input {
    flex: 1;
    font-family: inherit;
    font-size: 0.88rem;
    padding: 0.6rem 0.8rem;
    border: 1.5px solid #e0dbd3;
    border-radius: 8px;
    background: white;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.15s;
  }

  .add-row input:focus { border-color: #c84b2f; }

  .add-row button {
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 500;
    padding: 0.6rem 1rem;
    border: none;
    border-radius: 8px;
    background: #1a1a1a;
    color: white;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .add-row button:hover { background: #333; }

  .progress-wrap { display: flex; align-items: center; gap: 0.6rem; margin-top: 0.5rem; }
  .progress-track { flex: 1; height: 3px; background: #e8e4de; border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: #4a7c59; border-radius: 99px; transition: width 0.4s ease; }
  .progress-txt { font-size: 0.72rem; color: #aaa; white-space: nowrap; }

  /* LINKS */
  .links-side { }

  .link-add-form { display: flex; flex-direction: column; gap: 0.4rem; }

  .link-add-form input {
    font-family: inherit;
    font-size: 0.85rem;
    padding: 0.55rem 0.75rem;
    border: 1.5px solid #e0dbd3;
    border-radius: 8px;
    background: white;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  .link-add-form input:focus { border-color: #c84b2f; }

  .link-add-row { display: flex; gap: 0.4rem; }

  .link-add-form button {
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 0.55rem 1rem;
    border: none;
    border-radius: 8px;
    background: #1a1a1a;
    color: white;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .link-add-form button:hover { background: #333; }

  .link-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.65rem 0;
    border-bottom: 1px solid #f0ede8;
    text-decoration: none;
    color: inherit;
    group: true;
  }

  .link-item:last-child { border-bottom: none; }

  .link-favicon {
    width: 30px; height: 30px;
    border-radius: 7px;
    background: #f0ede8;
    border: 1px solid #e8e4de;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    flex-shrink: 0;
    overflow: hidden;
  }

  .link-favicon img { width: 18px; height: 18px; object-fit: contain; }

  .link-info { flex: 1; min-width: 0; }
  .link-name { font-size: 0.88rem; font-weight: 500; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .link-note { font-size: 0.76rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 0.1rem; }

  .link-open {
    font-size: 0.75rem;
    padding: 0.25rem 0.55rem;
    border-radius: 6px;
    background: #f0ede8;
    color: #666;
    text-decoration: none;
    flex-shrink: 0;
    transition: all 0.15s;
    border: none;
    cursor: pointer;
    font-family: inherit;
  }

  .link-open:hover { background: #1a1a1a; color: white; }

  .link-del {
    background: none; border: none; cursor: pointer;
    color: #ddd; font-size: 0.85rem; padding: 2px 4px;
    transition: color 0.15s; flex-shrink: 0;
    opacity: 0;
  }

  .link-item:hover .link-del { opacity: 1; }
  .link-del:hover { color: #e05a3a; }

  .empty { text-align: center; padding: 3rem 1rem; color: #ccc; font-size: 0.85rem; }
  .empty .icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🏡 Vores flytning</h1>
    <p>1. september 2026</p>
  </div>
  <div class="countdown">
    <div class="countdown-num" id="daysLeft">—</div>
    <div class="countdown-lbl">dage tilbage</div>
  </div>
</header>

<div class="layout">

  <!-- TO DO -->
  <div class="panel tasks-side">
    <div class="panel-header">
      <span class="panel-title">To do</span>
      <span class="panel-meta" id="taskMeta">0 tilbage</span>
    </div>
    <div class="panel-body" id="taskList"></div>
    <div class="panel-footer">
      <div class="add-row">
        <input type="text" id="taskInput" placeholder="Tilføj opgave…" onkeydown="if(event.key==='Enter')addTask()">
        <button onclick="addTask()">Tilføj</button>
      </div>
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <span class="progress-txt" id="progressTxt">0 %</span>
      </div>
    </div>
  </div>

  <!-- LINKS -->
  <div class="panel links-side">
    <div class="panel-header">
      <span class="panel-title">Links</span>
      <span class="panel-meta" id="linkMeta">0 gemt</span>
    </div>
    <div class="panel-body" id="linkList"></div>
    <div class="panel-footer">
      <div class="link-add-form">
        <div class="link-add-row">
          <input type="url" id="linkUrl" placeholder="https://…" inputmode="url" autocorrect="off" autocapitalize="none" oninput="prefillLinkTitle()" style="flex:1">
          <input type="text" id="linkTitle" placeholder="Titel" style="flex:0 0 110px">
        </div>
        <div class="link-add-row">
          <input type="text" id="linkNote" placeholder="Note (valgfri)" style="flex:1">
          <button onclick="addLink()">Gem</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
let data = { tasks: [], links: [] };

function save() { localStorage.setItem('flytning_simple', JSON.stringify(data)); }
function load() {
  try { const r = localStorage.getItem('flytning_simple'); if (r) data = JSON.parse(r); } catch(e){}
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Countdown
(function() {
  const d = Math.ceil((new Date('2026-09-01') - new Date()) / 86400000);
  document.getElementById('daysLeft').textContent = d > 0 ? d : '🎉';
})();

// ── TASKS ──────────────────────────────────────────────────────────────────
function addTask() {
  const inp = document.getElementById('taskInput');
  const text = inp.value.trim();
  if (!text) return;
  data.tasks.push({ id: 't'+Date.now(), text, done: false });
  inp.value = '';
  save(); renderTasks();
}

function toggleTask(id) {
  const t = data.tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); renderTasks(); }
}

function deleteTask(id) {
  data.tasks = data.tasks.filter(t => t.id !== id);
  save(); renderTasks();
}

function renderTasks() {
  const done = data.tasks.filter(t => t.done).length;
  const total = data.tasks.length;
  const left = total - done;
  const pct = total > 0 ? Math.round(done/total*100) : 0;

  document.getElementById('taskMeta').textContent = left + ' tilbage';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressTxt').textContent = pct + ' %';

  const el = document.getElementById('taskList');
  if (data.tasks.length === 0) {
    el.innerHTML = `<div class="empty"><div class="icon">✅</div>Ingen opgaver endnu</div>`;
    return;
  }

  // Show undone first, then done
  const sorted = [...data.tasks.filter(t=>!t.done), ...data.tasks.filter(t=>t.done)];
  el.innerHTML = sorted.map(t => `
    <div class="task-item">
      <div class="task-cb ${t.done?'checked':''}" onclick="toggleTask('${t.id}')"></div>
      <span class="task-text ${t.done?'done':''}" onclick="toggleTask('${t.id}')">${esc(t.text)}</span>
      <button class="task-del" onclick="deleteTask('${t.id}')">✕</button>
    </div>
  `).join('');
}

// ── LINKS ──────────────────────────────────────────────────────────────────
function prefillLinkTitle() {
  const titleInp = document.getElementById('linkTitle');
  if (titleInp.value) return;
  try {
    const url = new URL(document.getElementById('linkUrl').value);
    titleInp.placeholder = url.hostname.replace('www.','');
  } catch(e){}
}

function addLink() {
  const url = document.getElementById('linkUrl').value.trim();
  if (!url) return;
  let title = document.getElementById('linkTitle').value.trim();
  if (!title) { try { title = new URL(url).hostname.replace('www.',''); } catch(e) { title = url; } }
  const note = document.getElementById('linkNote').value.trim();
  data.links.push({ id: 'l'+Date.now(), url, title, note });
  document.getElementById('linkUrl').value = '';
  document.getElementById('linkTitle').value = '';
  document.getElementById('linkNote').value = '';
  document.getElementById('linkTitle').placeholder = 'Titel';
  save(); renderLinks();
}

function deleteLink(id) {
  data.links = data.links.filter(l => l.id !== id);
  save(); renderLinks();
}

function getFavicon(url) {
  try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=32`; }
  catch(e) { return null; }
}

function renderLinks() {
  document.getElementById('linkMeta').textContent = data.links.length + ' gemt';
  const el = document.getElementById('linkList');
  if (data.links.length === 0) {
    el.innerHTML = `<div class="empty"><div class="icon">🔗</div>Ingen links endnu</div>`;
    return;
  }
  el.innerHTML = data.links.map(l => {
    const fav = getFavicon(l.url);
    return `
      <div class="link-item">
        <div class="link-favicon">
          ${fav ? `<img src="${fav}" onerror="this.parentElement.textContent='🔗'">` : '🔗'}
        </div>
        <div class="link-info">
          <div class="link-name">${esc(l.title)}</div>
          ${l.note ? `<div class="link-note">${esc(l.note)}</div>` : `<div class="link-note">${esc(l.url)}</div>`}
        </div>
        <a class="link-open" href="${esc(l.url)}" target="_blank" rel="noopener">Åbn ↗</a>
        <button class="link-del" onclick="deleteLink('${l.id}')">✕</button>
      </div>
    `;
  }).join('');
}

load();
renderTasks();
renderLinks();
</script>
</body>
</html>
